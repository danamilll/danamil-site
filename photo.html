<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Фото — Danamil</title>
  <style>

@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

* { box-sizing: border-box; }

:root {
  --text: #f4efe6;
  --muted: #a5a096;
  --muted-dark: #6d7078;
  --line: rgba(255,255,255,.13);
  --brass: #c4a46a;
  --surface: rgba(18,20,25,.78);
  --shadow: 0 35px 120px rgba(0,0,0,.62);
  --radius: 28px;
}

html { scroll-behavior: smooth; }

body {
  margin: 0;
  min-height: 100vh;
  overflow-x: hidden;
  font-family: Manrope, Arial, sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at 14% 18%, rgba(196,164,106,.22), transparent 28%),
    radial-gradient(circle at 86% 16%, rgba(125,143,184,.16), transparent 26%),
    radial-gradient(circle at 70% 86%, rgba(143,95,95,.13), transparent 31%),
    linear-gradient(135deg, #050608, #12151c 54%, #07080a);
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,.028) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.028) 1px, transparent 1px);
  background-size: 46px 46px;
  opacity: .62;
  mask-image: linear-gradient(to bottom, #000, transparent 86%);
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at center, transparent 46%, rgba(0,0,0,.54)),
    linear-gradient(to bottom, rgba(255,255,255,.04), transparent 18%);
}

a { color: inherit; }
button { font-family: inherit; }

.page {
  position: relative;
  z-index: 1;
  width: min(1240px, calc(100% - 34px));
  min-height: 100vh;
  margin: 0 auto;
  padding: 22px 0 56px;
}

.menubar {
  height: 46px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: rgba(12,14,18,.56);
  backdrop-filter: blur(22px);
  box-shadow: 0 18px 70px rgba(0,0,0,.28);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  animation: fadeDown .7s ease both;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  font-weight: 800;
  letter-spacing: -.03em;
  text-decoration: none;
}

.brand-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--brass);
  box-shadow: 0 0 30px rgba(196,164,106,.72);
}

.nav { display: flex; gap: 8px; color: var(--muted); font-size: 13px; font-weight: 700; }
.nav a { text-decoration: none; padding: 8px 10px; border-radius: 999px; transition: .2s ease; }
.nav a:hover { background: rgba(255,255,255,.07); color: var(--text); }

.hero { padding: 82px 0 36px; animation: rise .8s ease both; }
.kicker {
  color: var(--brass);
  font-family: "IBM Plex Mono", monospace;
  text-transform: uppercase;
  letter-spacing: .14em;
  font-size: 12px;
  margin-bottom: 18px;
  font-weight: 600;
}
h1 {
  margin: 0;
  font-size: clamp(58px, 8vw, 118px);
  line-height: .93;
  letter-spacing: -.065em;
  font-weight: 800;
}
.lead {
  margin: 28px 0 0;
  max-width: 820px;
  color: var(--muted);
  font-size: clamp(20px, 2.2vw, 32px);
  line-height: 1.25;
  letter-spacing: -.035em;
  font-weight: 600;
}
.lead:empty { display: none; }

.card {
  border: 1px solid rgba(255,255,255,.17);
  border-radius: var(--radius);
  background: linear-gradient(145deg, rgba(255,255,255,.10), transparent 38%), var(--surface);
  backdrop-filter: blur(24px);
  box-shadow: var(--shadow);
  overflow: hidden;
}

.window-top {
  height: 52px;
  border-bottom: 1px solid var(--line);
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 0 16px;
  background: rgba(255,255,255,.035);
  color: var(--muted-dark);
  font-family: "IBM Plex Mono", monospace;
  font-size: 12px;
  user-select: none;
}

.window-top.draggable-handle { cursor: grab; }
.window-top.draggable-handle:active { cursor: grabbing; }

.dots { display: flex; gap: 8px; align-items: center; justify-self: start; }
.dot { width: 11px; height: 11px; border-radius: 50%; background: #30343d; border: 1px solid rgba(255,255,255,.14); }
.dot.red { background: #ff5f57; }
.dot.yellow { background: #ffbd2e; }
.dot.green { background: #28c840; }
.dot.empty { background: #3f444b; opacity: .9; }
.window-title { justify-self: center; }

.card-body { padding: 30px; }
.section-title {
  margin: 0 0 18px;
  font-size: clamp(34px, 4vw, 58px);
  line-height: 1;
  letter-spacing: -.06em;
  font-weight: 800;
}
.text { margin: 0; color: var(--muted); font-size: 18px; line-height: 1.62; }

.placeholder {
  margin-top: 22px;
  border: 1px dashed rgba(255,255,255,.18);
  border-radius: 22px;
  padding: 22px;
  color: var(--muted-dark);
  font-family: "IBM Plex Mono", monospace;
  font-size: 13px;
  line-height: 1.55;
  background:
    radial-gradient(circle at 20% 10%, rgba(196,164,106,.08), transparent 32%),
    rgba(255,255,255,.025);
}

.actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 26px; }
.btn {
  min-height: 54px;
  padding: 0 22px;
  border-radius: 999px;
  border: 0;
  background: var(--text);
  color: #090a0d;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  font-weight: 900;
  font-size: 17px;
  transition: .2s ease;
  cursor: pointer;
}
.btn:hover { transform: translateY(-2px); background: var(--brass); }
.btn.secondary { background: rgba(255,255,255,.04); color: var(--text); border: 1px solid var(--line); }
.btn.secondary:hover { background: rgba(255,255,255,.075); }

.tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; }
.tag {
  padding: 8px 11px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: rgba(255,255,255,.04);
  font-size: 12px;
  font-weight: 800;
}

.footer {
  margin-top: 36px;
  display: flex;
  justify-content: space-between;
  color: var(--muted-dark);
  font-family: "IBM Plex Mono", monospace;
  font-size: 12px;
}

.modal {
  position: fixed;
  inset: 0;
  z-index: 50;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: rgba(0,0,0,.55);
  backdrop-filter: blur(12px);
}
.modal.active { display: flex; animation: fadeIn .18s ease both; }
.modal-window {
  width: min(860px, 100%);
  max-height: 86vh;
  overflow: auto;
  border: 1px solid rgba(255,255,255,.17);
  border-radius: var(--radius);
  background: linear-gradient(145deg, rgba(255,255,255,.10), transparent 38%), rgba(18,20,25,.96);
  box-shadow: var(--shadow);
}
.modal-content { padding: 34px; }
.modal-content h2 { margin: 0 0 18px; font-size: clamp(40px, 5vw, 70px); line-height: .95; letter-spacing: -.06em; }
.modal-content p { color: var(--muted); font-size: 18px; line-height: 1.62; }
.close-btn { justify-self: end; background: none; border: 0; color: var(--muted); font-size: 14px; font-weight: 800; cursor: pointer; }

.draggable-modal { position: relative; }

@keyframes rise { from { opacity: 0; transform: translateY(18px) scale(.99); } to { opacity: 1; transform: translateY(0) scale(1); } }
@keyframes fadeDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

@media (max-width: 860px) {
  .menubar { justify-content: center; }
  .nav { display: none; }
  .hero { padding-top: 58px; }
  .card-body, .modal-content { padding: 22px; }
  .footer { display: grid; gap: 10px; }
}

@media (max-width: 520px) {
  .page { width: min(100% - 22px, 1240px); }
  h1 { font-size: 48px; letter-spacing: -.045em; }
  .lead { font-size: 20px; }
  .btn { width: 100%; }
}


.photo-page { min-height: 660px; border-radius: 32px; border: 1px dashed rgba(255,255,255,.22); background: radial-gradient(circle at 28% 18%, rgba(125,143,184,.22), transparent 34%), radial-gradient(circle at 78% 76%, rgba(196,164,106,.16), transparent 32%), linear-gradient(145deg, #242936, #0d0f13); display: flex; align-items: center; justify-content: center; color: var(--muted-dark); font-family: "IBM Plex Mono", monospace; font-size: 14px; position: relative; overflow: hidden; }
.photo-page::before { content: ""; width: 260px; height: 260px; border-radius: 50%; border: 1px solid rgba(255,255,255,.09); position: absolute; }
.photo-page::after { content: ""; width: 420px; height: 1px; background: rgba(255,255,255,.12); position: absolute; transform: rotate(-22deg); }

  </style>
</head>
<body>
  <div class="page">
    
<header class="menubar">
  <a class="brand" href="index.html">
    <span class="brand-dot"></span>
    <span>danamil.ru</span>
  </a>
  <nav class="nav">
    <a href="work.html">Работа</a>
    <a href="notes.html">Заметки</a>
    <a href="about.html">Обо мне</a>
    <a href="travel.html">Путешествия</a>
    <a href="contacts.html">Контакты</a>
  </nav>
</header>

    <main>
      <section class="hero">
        <div class="kicker">photo.html</div>
        <h1>Одна фотка.</h1>
        <p class="lead"></p>
      </section>
      
<section class="card">
  <div class="window-top">
    <div class="dots"><span class="dot empty"></span><span class="dot yellow"></span><span class="dot green"></span></div>
    <span class="window-title">one.photo</span>
    <div></div>
  </div>
  <div class="card-body">
    <div class="photo-page">место для одной твоей фотки</div>
    <div class="placeholder">Заглушка.</div>
  </div>
</section>

      <div class="actions">
        <a class="btn secondary" href="index.html">← На главную</a>
      </div>
    </main>
    
<footer class="footer">
  <span>© 2026 Danamil</span>
  <span>personal site</span>
</footer>

  </div>
  
<script>
  document.querySelectorAll("[data-modal]").forEach(button => {
    button.addEventListener("click", () => {
      const modal = document.getElementById(button.dataset.modal);
      if (modal) modal.classList.add("active");
    });
  });

  document.querySelectorAll("[data-close]").forEach(button => {
    button.addEventListener("click", () => {
      const modal = button.closest(".modal");
      if (modal) modal.classList.remove("active");
    });
  });

  document.querySelectorAll(".modal").forEach(modal => {
    modal.addEventListener("click", event => {
      if (event.target === modal) modal.classList.remove("active");
    });
  });

  document.querySelectorAll(".draggable-modal").forEach(windowEl => {
    const handle = windowEl.querySelector(".draggable-handle");
    if (!handle) return;

    let isDragging = false;
    let startX = 0;
    let startY = 0;
    let startLeft = 0;
    let startTop = 0;

    handle.addEventListener("mousedown", event => {
      if (event.target.closest("button")) return;

      isDragging = true;
      const rect = windowEl.getBoundingClientRect();

      windowEl.style.position = "fixed";
      windowEl.style.left = rect.left + "px";
      windowEl.style.top = rect.top + "px";
      windowEl.style.margin = "0";

      startX = event.clientX;
      startY = event.clientY;
      startLeft = rect.left;
      startTop = rect.top;

      document.addEventListener("mousemove", drag);
      document.addEventListener("mouseup", stop);
    });

    function drag(event) {
      if (!isDragging) return;
      windowEl.style.left = startLeft + event.clientX - startX + "px";
      windowEl.style.top = startTop + event.clientY - startY + "px";
    }

    function stop() {
      isDragging = false;
      document.removeEventListener("mousemove", drag);
      document.removeEventListener("mouseup", stop);
    }
  });
</script>

</body>
</html>
